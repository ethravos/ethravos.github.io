<!DOCTYPE html>
<html lang="en">
<head>
    {% include "comp/base-head.html" %}
    <link rel="stylesheet" href="/css/article.css"/>
</head>
<body>
    <div class="main-wrapper">
        {% include "comp/nav.html" %}
        <div class="content-wrapper">
            <div class="content__body">
                <h1>{{ title }}</h1>
                {{ content | safe }}
            </div>
            <div class="content__side">
                <div class="side__image">
                    <img src="{{ image }}" alt="">
                </div>
                <div class="side__about">{{ about }}</div>
                <div class="side__links">
                    {% for link in backlinks %}
                        <div class="backlink">+ <a href="{{ link.url }}">{{ link.title }}</a></div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
